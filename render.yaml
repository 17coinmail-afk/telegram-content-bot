services:
  - type: web
    name: telegram-content-bot
    runtime: docker
    plan: standard
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: UNSPLASH_ACCESS_KEY
        sync: false
      - key: YOOKASSA_SHOP_ID
        sync: false
      - key: YOOKASSA_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: bot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: bot-redis
          property: connectionString
      - key: WEBHOOK_HOST
        value: https://telegram-content-bot.onrender.com
      - key: WEBHOOK_PATH
        value: /webhook
      - key: TRIAL_DAYS
        value: "7"
      - key: POSTS_PER_DAY_TRIAL
        value: "3"
      - key: POSTS_PER_DAY_SUBSCRIPTION
        value: "50"
      - key: SUBSCRIPTION_PRICE
        value: "990"
    healthCheckPath: /health

  - type: redis
    name: bot-redis
    plan: free
    ipAllowList: []

databases:
  - name: bot-db
    plan: free
    postgresMajorVersion: 15
